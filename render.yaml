services:
  - type: web
    name: cpm-app
    env: node
    plan: starter
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    healthCheckPath: "/"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set your external connection string in the Render Dashboard for security
      - key: JWT_SECRET
        generateValue: true
      - key: EMIT_SECRET
        generateValue: true
      - key: INTERNAL_WS_SERVER_URL
        value: "http://localhost:10000" # Render uses 10000 by default but we follow $PORT
      - key: ALLOWED_ORIGIN
        sync: false # Set this to the service's onrender.com URL later

