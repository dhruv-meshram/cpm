services:
  - type: web
    name: cpm-ws-server
    env: node
    plan: starter
    buildCommand: "npm install && npx prisma generate"
    startCommand: "node apps/web/ws-server.mjs"
    healthCheckPath: "/emit" # While this returns 401 Unauthorized without auth, it confirms the HTTP server is alive
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMIT_SECRET
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
